services:
  mysql:
    image: mysql:8.0
    container_name: central-bank-core-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: central_bank_core
      MYSQL_USER: central_bank
      MYSQL_PASSWORD: central_bank_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "central_bank", "-pcentral_bank_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
